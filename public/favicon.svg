<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fav-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="1" stop-color="#60A5FA" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Futuristic Rocket/A Symbol -->
  <path d="M32 8L56 52H44L32 28L20 52H8L32 8Z" fill="url(#fav-grad)" filter="url(#soft-glow)" />
  
  <!-- Core Energy Pulse -->
  <circle cx="32" cy="40" r="5" fill="white">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Subtle Orbital Arc -->
  <path d="M12 48C18 54 26 56 32 56C38 56 46 54 52 48" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4" />
</svg>
